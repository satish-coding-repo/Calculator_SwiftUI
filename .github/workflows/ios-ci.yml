name: iOS CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build & Run Tests
    runs-on: macos-15        # ← pin to macOS 15 explicitly

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Use this action instead of manual xcode-select
      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable   # ← always picks correct version automatically

      - name: Show Build Info
        run: |
          xcodebuild -version
          swift --version

      - name: Build App
        run: |
          xcodebuild build \
            -scheme "Calculator_SwiftUI" \
            -project "Calculator_SwiftUI.xcodeproj" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -scheme "Calculator_SwiftUI" \
            -project "Calculator_SwiftUI.xcodeproj" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true

  swiftlint:
    name: SwiftLint Code Check
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --reporter github-actions-logging
