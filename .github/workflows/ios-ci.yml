name: iOS CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ─────────────────────────────────
  # JOB 1: BUILD & TEST
  # ─────────────────────────────────
  build-and-test:
    name: Build & Run Tests
    runs-on: macos-latest

    steps:
      # 1. Checkout your code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Select Xcode version
      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      # 3. Show build environment info
      - name: Show Build Info
        run: |
          xcodebuild -version
          swift --version

      # 4. Install CocoaPods (if you use pods)
      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod install --repo-update
        # Remove above 2 lines if you use SPM only

      # 5. Build the app
      - name: Build App
        run: |
          xcodebuild build \
            -scheme "Calculator_SwiftUI" \
            -workspace "Calculator_SwiftUI.xcworkspace" \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty

      # 6. Run unit tests
      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -scheme "Calculator_SwiftUI" \
            -workspace "Calculator_SwiftUI.xcworkspace" \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty --report junit

      # 7. Upload test results
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/reports/

  # ─────────────────────────────────
  # JOB 2: SWIFTLINT (Code Quality)
  # ─────────────────────────────────
  swiftlint:
    name: SwiftLint Code Check
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --reporter github-actions-logging
